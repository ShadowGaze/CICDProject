version: '3.9'

services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       crud_db
      POSTGRES_USER:     myuser
      POSTGRES_PASSWORD: mypassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ← no ports here, db is only accessible inside Docker network

  web:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web

volumes:
  postgres_data: