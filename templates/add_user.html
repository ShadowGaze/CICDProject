{% extends "base.html" %}
{% block content %}
<h1>Add Old User asdasdasd</h1>
<div class="card">
  {% if error %}
  <p class="error"> {{ error }}</p>
  {% endif %}

  <form method="POST" action="/">
    <label for="name">Full Name</label>
    <input type="text" id="name" name="name" placeholder="Rishabh Singh" required>

    <label for="dob">Date of Birth</label>
    <input type="date" id="dob" name="dob" required>

    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" placeholder="rishabh@email.com" required>

    <button class="btn btn-primary" type="submit">Save User</button>
  </form>
</div>
{% endblock %}
